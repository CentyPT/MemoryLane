<!doctype html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Memory Lane</title>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      #overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.8);
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #start-btn {
        padding: 15px 30px;
        font-size: 20px;
        background: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
      }
      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div id="overlay">
      <button id="start-btn">Começar Experiência</button>
    </div>

    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind; filterMinCF:0.0001; filterBeta: 0.001;"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <a-assets>
        <video
          id="vid0"
          src="./VideoACC.mp4"
          webkit-playsinline
          playsinline
          loop
          crossorigin="anonymous"
        ></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity
        mindar-image-target="targetIndex: 0"
        class="target-entity"
        data-video="#vid0"
      >
        <a-video src="#vid0" position="0 0 0" height="1" width="1"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const startBtn = document.querySelector("#start-btn");
      const overlay = document.querySelector("#overlay");
      const videos = document.querySelectorAll("video");
      const targets = document.querySelectorAll(".target-entity");

      startBtn.addEventListener("click", () => {
        overlay.classList.add("hidden");
        videos.forEach((v) => {
          v.play();
          v.pause();
          v.currentTime = 0;
        });
      });

      targets.forEach((target) => {
        target.addEventListener("targetFound", () => {
          const videoId = target.getAttribute("data-video");
          const video = document.querySelector(videoId);
          if (video) video.play();
        });

        target.addEventListener("targetLost", () => {
          const videoId = target.getAttribute("data-video");
          const video = document.querySelector(videoId);
          if (video) video.pause();
        });
      });

      videos.forEach((video) => {
        video.addEventListener("ended", () => {
          console.log("Vídeo acabou, forçando reinício...");
          video.currentTime = 0;
          video.play();
        });
      });
    </script>
  </body>
</html>
